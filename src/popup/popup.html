<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dancing Chrome</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="panel">
      <header class="hero">
        <div class="brand-mark" aria-hidden="true">
          <i></i><i></i><i></i><i></i><i></i>
        </div>
        <div class="brand-text">
          <p class="eyebrow">Rhythm window driver</p>
          <h1>Dancing Chrome</h1>
        </div>
        <div id="statusBadge" class="status-badge" data-state="idle">
          <span></span><b>OFF</b>
        </div>
      </header>

      <section class="power-zone">
        <button id="powerButton" class="power-button" type="button">
          <span class="power-icon" aria-hidden="true"></span>
          <strong>START</strong>
          <small>현재 탭 사운드</small>
        </button>
        <div class="meter" aria-label="현재 감지 음량">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <p id="statusText" class="status-text">준비 완료 — 이 탭에서 음악을 틀어주세요.</p>
      </section>

      <section class="controls" aria-label="움직임 설정">
        <div class="control-heading">
          <h2>Motion mixer</h2>
          <span id="intensityName">SWOOP</span>
        </div>

        <label class="slider-row">
          <span><b>강도</b><output id="intensityValue">42</output></span>
          <input id="intensity" type="range" min="1" max="100" value="42">
          <small>살랑살랑</small><small>화면 전체를 쌩쌩</small>
        </label>

        <label class="slider-row">
          <span><b>감도</b><output id="sensitivityValue">55</output></span>
          <input id="sensitivity" type="range" min="1" max="100" value="55">
          <small>둔감</small><small>민감</small>
        </label>

        <label class="slider-row">
          <span><b>박자 반응</b><output id="beatBoostValue">70</output></span>
          <input id="beatBoost" type="range" min="0" max="100" value="70">
          <small>절제</small><small>격렬</small>
        </label>

        <div class="switch-row">
          <label class="switch-label" for="driftEnabled">
            <span><b>Flyby</b><small>좌우로 화면을 크게 횡단</small></span>
            <input id="driftEnabled" type="checkbox">
            <i aria-hidden="true"></i>
          </label>
          <label class="switch-label" for="pulseEnabled">
            <span><b>Size pulse</b><small>비트에 맞춰 창 크기 확대·축소</small></span>
            <input id="pulseEnabled" type="checkbox">
            <i aria-hidden="true"></i>
          </label>
          <label class="switch-label" for="rotationEnabled">
            <span><b>Spin</b><small>탭 화면을 빙글빙글 회전 (실험적)</small></span>
            <input id="rotationEnabled" type="checkbox">
            <i aria-hidden="true"></i>
          </label>
          <label class="switch-label" for="restoreOnStop">
            <span><b>Safe return</b><small>중지 시 원래 위치로 복귀</small></span>
            <input id="restoreOnStop" type="checkbox" checked>
            <i aria-hidden="true"></i>
          </label>
        </div>
      </section>

      <footer>
        <p><b>START</b>는 지금 이 탭의 소리에 바로 연결됩니다.</p>
        <p class="shortcut">멈추기 단축키 <kbd>Alt</kbd><kbd>Shift</kbd><kbd>X</kbd></p>
      </footer>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
